<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Desk Dashboard</title>
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fcee0a;
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 15, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            cursor: none; /* Hide real cursor */
        }

        /* Video Feed (Hidden) */
        #input_video {
            display: none;
        }

        /* Tracking Canvas */
        #output_canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Virtual Cursor */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-yellow);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 0 10px var(--neon-yellow);
            transition: width 0.1s, height 0.1s;
        }

        #cursor.pinching {
            width: 10px;
            height: 10px;
            background: var(--neon-pink);
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        /* Background Effects */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* UI Components */
        .widget {
            position: absolute;
            background: var(--panel-bg);
            border: 2px solid var(--neon-cyan);
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(5px);
            clip-path: polygon(0% 0%, 95% 0%, 100% 15%, 100% 100%, 5% 100%, 0% 85%);
            user-select: none;
            min-width: 250px;
        }

        .widget-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            pointer-events: auto;
        }

        /* Clock */
        #clock-widget {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            border: none;
            background: transparent;
        }
        #time { font-size: 4rem; font-weight: 700; text-shadow: 0 0 20px var(--neon-cyan); }
        #date { font-size: 1.2rem; color: var(--neon-pink); }

        /* Todo List */
        #todo-widget { top: 200px; left: 50px; }
        .todo-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }
        .todo-item:hover { background: rgba(0, 243, 255, 0.1); border-left: 3px solid var(--neon-yellow); }
        .btn {
            background: var(--neon-cyan);
            border: none;
            color: black;
            padding: 5px 10px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Weather */
        #weather-widget { top: 200px; right: 50px; }
        .temp { font-size: 3rem; color: var(--neon-yellow); }
        .desc { text-transform: uppercase; letter-spacing: 2px; }

        .interactive:hover {
            box-shadow: 0 0 25px var(--neon-yellow);
            border-color: var(--neon-yellow);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div id="cursor"></div>

    <!-- Clock Widget -->
    <div id="clock-widget" class="widget">
        <div id="time">00:00:00</div>
        <div id="date">OCT 27, 2077</div>
    </div>

    <!-- Todo Widget -->
    <div id="todo-widget" class="widget interactive" data-draggable="true">
        <div class="widget-header"><span>SYSTEM_TASKS</span> [DRAG_READY]</div>
        <div id="todo-list">
            <div class="todo-item">UPGRADE NEURAL LINK</div>
            <div class="todo-item">PURCHASE RAM CHIPS</div>
        </div>
        <button class="btn interactive" onclick="addTodo()">+ ADD_TASK</button>
    </div>

    <!-- Weather Widget -->
    <div id="weather-widget" class="widget interactive" data-draggable="true">
        <div class="widget-header"><span>ENV_STATUS</span> [DRAG_READY]</div>
        <div class="temp">24°C</div>
        <div class="desc">Acid Rain Warning</div>
        <div style="font-size: 0.8rem; margin-top:10px;">HUMIDITY: 88%</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const cursor = document.getElementById('cursor');
        
        let isPinching = false;
        let draggedElement = null;
        let dragOffset = { x: 0, y: 0 };

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
        }
        setInterval(updateClock, 1000);

        function addTodo() {
            const list = document.getElementById('todo-list');
            const item = document.createElement('div');
            item.className = 'todo-item';
            item.innerText = 'NEW UPLINK ESTABLISHED';
            list.appendChild(item);
        }

        // Handle Hand Tracking
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw Hand Skeleton
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00f3ff', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ff00ff', lineWidth: 1, radius: 3});

                    // Cursor tracking (Index Finger Tip)
                    const indexTip = landmarks[8];
                    const thumbTip = landmarks[4];
                    
                    const x = indexTip.x * window.innerWidth;
                    const y = indexTip.y * window.innerHeight;

                    cursor.style.left = x + 'px';
                    cursor.style.top = y + 'px';

                    // Pinch Detection
                    const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                    const pinchThreshold = 0.05;

                    if (distance < pinchThreshold) {
                        if (!isPinching) {
                            isPinching = true;
                            cursor.classList.add('pinching');
                            handlePinchStart(x, y);
                        }
                        handlePinchMove(x, y);
                    } else {
                        if (isPinching) {
                            isPinching = false;
                            cursor.classList.remove('pinching');
                            handlePinchEnd();
                        }
                    }
                    
                    // Hover effect logic
                    checkHover(x, y);
                }
            }
            canvasCtx.restore();
        }

        function checkHover(x, y) {
            const elements = document.elementsFromPoint(x, y);
            document.querySelectorAll('.interactive').forEach(el => el.style.borderColor = '');
            elements.forEach(el => {
                if (el.classList.contains('interactive')) {
                    el.style.borderColor = 'var(--neon-yellow)';
                }
            });
        }

        function handlePinchStart(x, y) {
            const elements = document.elementsFromPoint(x, y);
            
            // Check for buttons
            elements.forEach(el => {
                if (el.tagName === 'BUTTON') {
                    el.click();
                }
                
                // Check for draggable widgets
                if (el.closest('[data-draggable="true"]')) {
                    draggedElement = el.closest('[data-draggable="true"]');
                    const rect = draggedElement.getBoundingClientRect();
                    dragOffset.x = x - rect.left;
                    dragOffset.y = y - rect.top;
                }
            });
        }

        function handlePinchMove(x, y) {
            if (draggedElement) {
                draggedElement.style.left = (x - dragOffset.x) + 'px';
                draggedElement.style.top = (y - dragOffset.y) + 'px';
            }
        }

        function handlePinchEnd() {
            draggedElement = null;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        // Initialize
        window.onload = () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            camera.start();
            updateClock();
        };

        window.onresize = () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        };
    </script>
</body>
</html>
